<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pendle YT Insights</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0e14;
      color: #e6e6e6;
    }

    header {
      padding: 16px;
      font-size: 18px;
      font-weight: 600;
      border-bottom: 1px solid #1f2937;
    }

    #lastUpdated {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 4px;
    }

    .controls {
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    select {
      background: #0f172a;
      color: #e5e7eb;
      border: 1px solid #1f2937;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
    }

    table {
  width: 100%;
  border-collapse: collapse;
  min-width: 600px;
}

#ytTable {
  display: block;
  max-height: 75vh;
  overflow-y: auto;
}

    thead {
  position: sticky;
  top: 0;
  z-index: 20;
  background: #111827;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
}

thead th {
  backdrop-filter: blur(4px);
}

    th {
      text-align: left;
      padding: 12px 14px;
      font-size: 12px;
      color: #9ca3af;
    }

    td {
      padding: 14px;
      font-size: 14px;
      border-top: 1px solid #1f2937;
    }

    tbody tr {
  cursor: pointer;
  transition: background 0.15s ease;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
    }
    
    tbody td {
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
    }

    tbody tr,
tbody td {
  touch-action: manipulation;
}

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .row-link {
  display: block;
  text-decoration: none;
  color: inherit;
  padding: 14px;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.row-grid {
  display: grid;
  grid-template-columns: 1fr auto auto;
  align-items: center;
  gap: 8px;
}

.row-link:active {
  background: rgba(255,255,255,0.04);
}

    .center {
      text-align: right;
    }

    .yield-positive {
      color: #22c55e;
      font-weight: 600;
    }

    .yield-negative {
      color: #ef4444;
      font-weight: 600;
    }

    .apy {
      font-weight: 700;
    }

    .loading {
      padding: 20px;
      text-align: center;
      color: #9ca3af;
    }

    .token-name {
  pointer-events: none;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
    }
    
    /* ============================= */
/* Premium Loading Shimmer */
/* ============================= */

.shimmer-row td {
  padding: 14px;
}

.shimmer-box {
  height: 14px;
  border-radius: 6px;
  background: linear-gradient(
    90deg,
    #1f2937 0%,
    #2d3748 50%,
    #1f2937 100%
  );
  background-size: 200% 100%;
  animation: shimmerMove 1.4s ease-in-out infinite;
}

.shimmer-name {
  width: 120px;
  height: 16px;
}

.shimmer-yield {
  width: 60px;
}

.shimmer-apy {
  width: 80px;
}

@keyframes shimmerMove {
  0% {
    background-position: 200% 0;
  }
  100% {
    background-position: -200% 0;
  }
}
  </style>
</head>

<body>
  <header>
    Pendle YT Insights
    <div id="lastUpdated">Last updated: —</div>
  </header>

  <div class="controls">
  <div>
    <label>
      Chain:
      <select id="chainSelect"></select>
    </label>
  </div>

  <div>
    <input
      id="searchInput"
      type="text"
      placeholder="Search YT..."
      style="
        background:#0f172a;
        color:#e5e7eb;
        border:1px solid #1f2937;
        border-radius:6px;
        padding:6px 10px;
        font-size:13px;
      "
    />
  </div>
  </div>

  <div id="loading" class="loading"></div>

  <table id="ytTable">
    <thead>
      <tr>
        <th>YT</th>
        <th class="center">Current Yield</th>
        <th class="center">Net APY</th>
      </tr>
    </thead>
    <tbody id="ytBody"></tbody>
  </table>

<script>
  const API = "https://pendle-proxy.vercel.app/api/all";

  // -----------------------------
  // Fix Android back-navigation flash
  // -----------------------------
  function clearSelection() {
    if (window.getSelection) {
      const sel = window.getSelection();
      if (sel && sel.removeAllRanges) sel.removeAllRanges();
    }
  }

  window.addEventListener("pageshow", function (event) {
    if (event.persisted) {
      clearSelection();

      // tiny repaint to kill highlight frame
      document.body.style.opacity = "0.99";
      requestAnimationFrame(() => {
        document.body.style.opacity = "";
      });
    }
  });

  function shortYT(addr) {
    return addr.slice(0, 4) + "..." + addr.slice(-3);
  }

  function pct(num) {
    return (Number(num) * 100).toFixed(2) + "%";
  }

  const CHAIN_NAMES = {
    1: "Ethereum",
    56: "BNB Chain",
    42161: "Arbitrum",
    8453: "Base",
    146: "Chain 146",
    999: "Chain 999",
    9745: "Chain 9745",
  };

  function debounce(fn, delay) {
    let timer;
    return function (...args) {
      clearTimeout(timer);
      timer = setTimeout(() => fn.apply(this, args), delay);
    };
  }

  async function loadData() {
    const loadingDiv = document.getElementById("loading");
    const table = document.getElementById("ytTable");
    const body = document.getElementById("ytBody");

    loadingDiv.style.display = "block";
    table.style.display = "table";
    body.innerHTML = "";

    // shimmer
    for (let i = 0; i < 8; i++) {
      const tr = document.createElement("tr");
      tr.className = "shimmer-row";
      tr.innerHTML = `
        <td><div class="shimmer-box shimmer-name"></div></td>
        <td class="center"><div class="shimmer-box shimmer-yield"></div></td>
        <td class="center"><div class="shimmer-box shimmer-apy"></div></td>
      `;
      body.appendChild(tr);
    }

    try {
      const res = await fetch(API);
      const json = await res.json();

      if (!json.success) {
        throw new Error("API failure");
      }

      const rows = json.data.map(r => ({
        ...r,
        chain_id: Number(r.chain_id),
      }));

      // ---- Last updated ----
      let minsAgo = "?";

      if (json.snapshot_time) {
        const latestTime = new Date(json.snapshot_time).getTime();
        minsAgo = Math.floor(
          (Date.now() - latestTime) / (1000 * 60)
        );
      }

      const select = document.getElementById("chainSelect");
      const searchInput = document.getElementById("searchInput");

      // ---- Build chain selector ----
      const chainIds = [...new Set(rows.map(r => r.chain_id))]
        .sort((a, b) => a - b);

      select.innerHTML = "";

      const allOpt = document.createElement("option");
      allOpt.value = "all";
      allOpt.textContent = "All";
      select.appendChild(allOpt);

      chainIds.forEach(id => {
        const opt = document.createElement("option");
        opt.value = String(id);
        opt.textContent = CHAIN_NAMES[id] ?? `Chain ${id}`;
        select.appendChild(opt);
      });

      function renderTable() {
        body.innerHTML = "";

        let filtered = rows;

        // chain filter
        if (select.value !== "all") {
          filtered = filtered.filter(
            r => String(r.chain_id) === select.value
          );
        }

        // search filter
        const searchTerm = searchInput.value.toLowerCase();
        if (searchTerm) {
          filtered = filtered.filter(r =>
            (r.yt_name || "")
              .toLowerCase()
              .includes(searchTerm)
          );
        }

        document.getElementById("lastUpdated").innerText =
          `Last updated: ${minsAgo} min ago · ${filtered.length}/${rows.length} YTs`;

        filtered
          .sort(
            (a, b) =>
              Number(b.net_apy_to_maturity) -
              Number(a.net_apy_to_maturity)
          )
          .forEach(r => {
            const tr = document.createElement("tr");

            tr.innerHTML = `
              <td colspan="3" style="padding:0;">
                <a 
                  href="yt.html?chain_id=${r.chain_id}&yt_address=${r.yt_address}"
                  class="row-link"
                >
                  <div class="row-grid">
                    <div class="token-name">
                      ${r.yt_name ?? shortYT(r.yt_address)}
                    </div>
                    <div class="center ${
                      Number(r.net_yield) >= 0
                        ? "yield-positive"
                        : "yield-negative"
                    }">
                      ${pct(r.net_yield)}
                    </div>
                    <div class="center apy">
                      ${pct(r.net_apy_to_maturity)}
                    </div>
                  </div>
                </a>
              </td>
            `;

            // Clear selection before navigating
            tr.addEventListener("pointerdown", clearSelection);

            body.appendChild(tr);
          });

        loadingDiv.style.display = "none";
        table.style.display = "table";
      }

      select.onchange = renderTable;
      searchInput.oninput = debounce(renderTable, 300);

      renderTable();

    } catch (e) {
      document.getElementById("loading").innerText =
        "Failed to load data";
    }
  }

  loadData();
</script>
</body>
</html>
